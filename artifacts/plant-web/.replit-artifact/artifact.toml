kind = "web"
previewPath = "/plant-web/"
title = "Plant Care Tracker"
version = "1.0.0"
id = "artifacts/plant-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/plant-web/" ]
localPort = 26197

[services.development]
run = "pnpm --filter @workspace/plant-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plant-web", "run", "build" ]
publicDir = "artifacts/plant-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26197"
BASE_PATH = "/plant-web/"
